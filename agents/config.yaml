# EHR Populator Agent Configuration
# Copy to config.local.yaml and fill in secrets, or use environment variables.

llm:
  provider: ${LLM_PROVIDER}             # anthropic | openai | azure | custom
  model: ${LLM_MODEL}                   # set in .env
  api_key: ${LLM_API_KEY}              # or ANTHROPIC_API_KEY / OPENAI_API_KEY
  base_url: ${LLM_BASE_URL}            # for self-hosted OpenAI-compatible servers
  # tool_format controls how tool calls are parsed for OpenAI-compatible providers.
  # auto    — detect automatically (tries all known formats, recommended)
  # openai  — standard API tool_calls only, no text parsing
  # gpt-oss — <|start|>...<|call|>  (gpt-oss-120b, de.NBI/BIH)
  # llama   — <|python_tag|>...     (Llama 3.1+)
  # mistral — [TOOL_CALLS] [...]    (Mistral/Mixtral)
  # qwen    — ✿FUNCTION✿: ...      (Qwen series)
  # deepseek — <|tool_calls_begin|> (DeepSeek)
  tool_format: auto
  temperature: 0.3
  # context_window: total token budget of the model (input + output). Default 32768.
  # Set to the actual value for your model to avoid silent empty responses.
  # Common values: 32768 (32k), 65536 (64k), 131072 (128k).
  # context_window: 32768
  # NOTE: Token costs scale with patients × templates × retries.
  # A single composition with terminology lookups uses ~8k–20k tokens.
  # 10 patients × 3 templates = ~30 compositions = ~300k–600k tokens per run.
  # Use a smaller/faster model for large test runs to reduce cost and latency.

  # Optional: use a different (cheaper) model for the template analyzer
  # template_analyzer_model: claude-haiku-4-5-20251001

# ---------------------------------------------------------------------------
# Server configuration
#
# By default all services run locally via docker compose.
# To use existing servers instead, update the base_url fields below.
# You do NOT need docker compose if you point to external servers.
# ---------------------------------------------------------------------------

# Java validation service — always required (part of this repo, runs in docker)
validator:
  base_url: "http://localhost:8181"

# Snowstorm terminology server — required for code lookups
# Local (docker compose):  http://localhost:8085/fhir
# Existing Snowstorm:      https://your-snowstorm.example.com/fhir
terminology:
  base_url: "http://localhost:8085/fhir"
  # bearer_token: set via TERMINOLOGY_TOKEN env var

# EHRbase openEHR server — only needed if you want to upload compositions
# Local (docker compose):  http://localhost:8080/ehrbase
# Existing EHRbase:        https://your-ehrbase.example.com/ehrbase
ehrbase:
  enabled: false
  base_url: "http://localhost:8080/ehrbase"
  username: "ehrbase-user"
  # password: set via EHRBASE_PASSWORD env var

# FHIR server — only needed if you want to upload FHIR resources
# Local (docker compose):  http://localhost:8090/fhir
# Existing HAPI FHIR:      https://your-fhir.example.com/fhir
fhir_server:
  enabled: false
  base_url: "http://localhost:8090/fhir"
  # bearer_token: set via FHIR_BEARER_TOKEN env var

pipeline:
  max_retries: 5             # Max validation retry attempts per composition
  output_dir: "../output"    # Where to write generated files
  save_intermediate: true    # Save after each successful generation
  workers: 10                # Parallel patients (increase for higher throughput)
  max_llm_concurrency: 8     # Max concurrent LLM calls across all patients+templates
