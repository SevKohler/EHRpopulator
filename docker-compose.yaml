version: "3.8"

# Full EHR Populator stack.
# Usage:
#   docker compose up -d          start everything
#   docker compose logs -f        watch all logs
#   docker compose logs -f terminology-loader   watch terminology loading progress

services:

  # -------------------------------------------------------------------------
  # EHRbase — openEHR clinical data repository
  # -------------------------------------------------------------------------
  ehrbase-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ehrbase
      POSTGRES_PASSWORD: ehrbase
      POSTGRES_DB: ehrbase
    volumes:
      - ehrbase-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehrbase"]
      interval: 5s
      timeout: 5s
      retries: 10

  ehrbase:
    image: ehrbase/ehrbase:latest
    depends_on:
      ehrbase-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://ehrbase-db:5432/ehrbase
      DB_USER: ehrbase
      DB_PASS: ehrbase
      SERVER_NODENAME: local.ehrbase.org
      SECURITY_AUTHTYPE: BASIC
      SECURITY_AUTHUSER: ehrbase-user
      SECURITY_AUTHPASSWORD: SuperSecretPassword
      SECURITY_AUTHADMINUSER: ehrbase-admin
      SECURITY_AUTHADMINPASSWORD: EvenMoreSecretPassword
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ehrbase/rest/status"]
      interval: 10s
      timeout: 5s
      retries: 20

  # -------------------------------------------------------------------------
  # HAPI FHIR Server — FHIR R4
  # -------------------------------------------------------------------------
  fhir:
    image: hapiproject/hapi:latest
    ports:
      - "8090:8080"
    environment:
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_multiple_delete: "true"
    volumes:
      - fhir-data:/data/hapi
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 15s
      timeout: 10s
      retries: 20

  # -------------------------------------------------------------------------
  # Snowstorm — SNOMED CT + LOINC + ICD-10 terminology server
  # FHIR endpoint: http://localhost:8085/fhir
  # Native API:    http://localhost:8085
  # -------------------------------------------------------------------------
  snowstorm-es:
    image: elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    volumes:
      - snowstorm-es-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 20

  snowstorm:
    image: snomedinternational/snowstorm:latest
    depends_on:
      snowstorm-es:
        condition: service_healthy
    ports:
      - "8085:8080"
    command: --elasticsearch.urls=http://snowstorm-es:9200
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/branches"]
      interval: 15s
      timeout: 10s
      retries: 30

  # -------------------------------------------------------------------------
  # Terminology loader
  # Watches the ./terminology folder and loads files into Snowstorm on startup.
  # Drop files and restart: docker compose restart terminology-loader
  # Watch progress:         docker compose logs -f terminology-loader
  # -------------------------------------------------------------------------
  terminology-loader:
    build:
      context: ./terminology-loader
    volumes:
      - ./terminology/seeds:/terminology/seeds  # loaded once, state tracked in .loaded
      - ./terminology/fhir:/terminology/fhir    # reloaded on every restart
    environment:
      SNOWSTORM_URL: http://snowstorm:8080
    depends_on:
      snowstorm:
        condition: service_healthy
    restart: "no"   # runs once and exits — use: docker compose restart terminology-loader

  # -------------------------------------------------------------------------
  # Java validator service — HAPI FHIR + EHRbase SDK
  # POST /validate  — validate openEHR or FHIR resources
  # POST /webtemplate — convert OPT XML to web template JSON
  # -------------------------------------------------------------------------
  validator:
    build:
      context: ./validator
    ports:
      - "8181:8181"
    environment:
      VALIDATOR_EHRBASE_ENABLED: "true"
      VALIDATOR_EHRBASE_BASE_URL: "http://ehrbase:8080/ehrbase"
      VALIDATOR_EHRBASE_PASSWORD: "SuperSecretPassword"
      VALIDATOR_FHIR_TERMINOLOGY_SERVER_URL: "http://snowstorm:8080/fhir"
    depends_on:
      ehrbase:
        condition: service_healthy
      snowstorm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  ehrbase-db-data:
  fhir-data:
  snowstorm-es-data:
